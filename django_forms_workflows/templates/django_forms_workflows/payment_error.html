{% extends "django_forms_workflows/base.html" %}

{% block title %}Payment Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            <div class="card shadow-sm p-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3.5rem;"></i>
                </div>
                <h2 class="mb-3">Payment Error</h2>
                <p class="text-muted mb-4">{{ error }}</p>
                <div class="d-grid gap-2">
                    {% if submission %}
                    <a href="{% url 'forms_workflows:payment_initiate' submission.id %}" class="btn btn-primary">
                        <i class="bi bi-arrow-clockwise"></i> Try Again
                    </a>
                    <a href="{% url 'forms_workflows:payment_cancel' submission.id %}" class="btn btn-outline-secondary">
                        Cancel Payment
                    </a>
                    {% else %}
                    <a href="{% url 'forms_workflows:form_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Forms
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
