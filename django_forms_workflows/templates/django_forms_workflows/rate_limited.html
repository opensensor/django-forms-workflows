{% extends "django_forms_workflows/base.html" %}

{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            <div class="card shadow-sm p-5">
                <div class="mb-4">
                    <i class="bi bi-shield-exclamation text-warning" style="font-size: 4rem;"></i>
                </div>
                <h2 class="mb-3">Too Many Requests</h2>
                <p class="text-muted mb-4">
                    You've submitted too many forms in a short period of time.
                    Please wait a while before trying again.
                </p>
                <div class="d-grid gap-2">
                    <a href="{% url 'forms_workflows:form_list' %}" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-left"></i> Back to Forms
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
